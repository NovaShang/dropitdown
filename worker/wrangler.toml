name = "dropitdown-proxy"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# KV namespace stores per-device monthly counters.
# Create with: wrangler kv:namespace create QUOTA
# Then paste the returned id below.
[[kv_namespaces]]
binding = "QUOTA"
id = "32f5db375a374e319a50d7f48e83a2cf"

# DeepSeek API key — set with: wrangler secret put DEEPSEEK_API_KEY
# Default quota (calls per device per month).
[vars]
DEFAULT_MONTHLY_QUOTA = "200"
UPSTREAM_BASE_URL = "https://api.deepseek.com"
