name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        run: pip install uv
      - name: Install project
        run: uv pip install --system --prerelease=allow -e .
      - name: Smoke test CLI
        run: dropitdown --help

  swift:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build Swift package
        working-directory: app
        run: swift build
