name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write   # required to create the GitHub Release + upload assets

jobs:
  build-mac:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so build.sh's commit-count build number is stable

      - name: Verify tag matches VERSION
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF##*/}"
          VERSION="v$(tr -d ' \n' < VERSION)"
          if [[ "$TAG" != "$VERSION" ]]; then
            echo "::error::Tag $TAG does not match VERSION file ($VERSION). Bump VERSION or fix the tag."
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Import Developer ID Application certificate
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_KEYCHAIN_PWD: ${{ secrets.MACOS_KEYCHAIN_PWD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          CERT_P12="$RUNNER_TEMP/cert.p12"

          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$CERT_P12"

          security create-keychain -p "$MACOS_KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PWD" "$KEYCHAIN"

          security import "$CERT_P12" \
            -k "$KEYCHAIN" \
            -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$MACOS_KEYCHAIN_PWD" \
            "$KEYCHAIN"

          # Confirm the cert is visible to codesign
          security find-identity -p codesigning -v "$KEYCHAIN"
          rm -f "$CERT_P12"

      - name: Build .app bundle
        working-directory: app
        run: ./build.sh

      - name: Write notary key file
        env:
          NOTARY_KEY_P8: ${{ secrets.NOTARY_KEY_P8 }}
        run: |
          KEY_PATH="$RUNNER_TEMP/notary.p8"
          echo "$NOTARY_KEY_P8" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "NOTARY_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Sign + notarize + DMG
        working-directory: app
        env:
          APPLE_DEV_ID: ${{ secrets.MACOS_DEV_ID }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: ./sign-and-notarize.sh

      - name: Name DMG assets
        id: rename
        working-directory: app
        run: |
          TAG="${GITHUB_REF##*/}"
          # A versioned copy (nice for humans) and a stable copy the landing
          # page can link to via /releases/latest/download/DropItDown.dmg.
          cp .build/DropItDown.dmg ".build/DropItDown-${TAG}.dmg"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release + upload DMGs
        uses: softprops/action-gh-release@v2
        with:
          name: DropItDown ${{ steps.rename.outputs.tag }}
          tag_name: ${{ steps.rename.outputs.tag }}
          generate_release_notes: true
          files: |
            app/.build/DropItDown.dmg
            app/.build/DropItDown-${{ steps.rename.outputs.tag }}.dmg
